<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            background: linear-gradient(to right, #4d1188, #7c4e9e);
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

        }

        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 350px;
            min-height: 400px;
            padding: 30px;
            border-radius: 10px;
            background: linear-gradient(135deg, #7c4e9e, #c084fc);
        }

        button {
            display: block;
            margin: auto;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            background: linear-gradient(to right, #2136bf, #741fb5);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        /* Hover effect */
        button:hover {
            transform: scale(1.01);
            background-color: #7c4e9e;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }


        /* set input border and width */
        form input[type="email"],
        form input[type="password"] {
            padding: 10px 5px;
            width: 250px;
            border: none;
            border-radius: 5px;
        }

        /* form input {
            padding: 10px 5px;
            width: 250px;
            border: none;
            border-radius: 5px;
        } */

        /*  for login */
        p {
            font-size: 30px;
            font-family: Arial, Helvetica, sans-serif;
            width: 250px;
            color: white;
            text-align: center;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px;
            margin-top: 5px;
        }

        .remember {
            display: flex;
            align-items: center;
        gap: 2px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <p>Login Here</p>

        <form>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            <br><br>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <br><br>
            <div class="options">

                <div class="remember">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>

                <a href="#">Forgot password?</a>

            </div>

            <button>Login</button>
        </form>
    </div>
</body>

</html>
